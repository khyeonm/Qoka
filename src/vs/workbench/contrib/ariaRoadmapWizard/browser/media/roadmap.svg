<svg xmlns="http://www.w3.org/2000/svg" viewBox="1.5 1 21 21" fill="none" stroke="#000" stroke-width="1.05" stroke-linecap="round" stroke-linejoin="round">
  <!-- winding road: start stop (bottom-left) → right → up → left → up to the goal -->
  <path d="M5 20 H14 a3.5 3.5 0 0 0 0-7 H10 a3.5 3.5 0 0 1 0-7 h6"/>
  <!-- start stop -->
  <circle cx="5" cy="20" r="1.3" fill="#000" stroke="none"/>
  <!-- waypoint, centered on the road's middle horizontal segment (y=13) -->
  <circle cx="12" cy="13" r="1.3" fill="#000" stroke="none"/>
  <!-- goal flag: thin pole + solid pennant -->
  <path d="M16 6 V1.5"/>
  <path d="M16 1.7 L20.6 3.3 L16 4.9 Z" fill="#000" stroke="none"/>
</svg>
