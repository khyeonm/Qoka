# Publishes the base VM disk image the built-in Run environment downloads
# (extensions/aria-autopipe/src/vm/provisioner.ts -> aria-vm-<arch>.qcow2).
#
# v4 bakes the REMOTE-EXTENSION-HOST stack AND Aria's runtimes so the image can
# host Aria itself with ZERO guest-side install (the whole point: users download
# the image, they never run installers):
#   - docker            (for autopipe's `docker build`)
#   - aria-reh          (VS Code REH server = product.serverApplicationName; the
#                        "extension runner" the host renderer connects to)
#   - node/npm          (drives the npm CLIs below)
#   - codex + claude    (@openai/codex, @anthropic-ai/claude-code) at /usr/local/bin
#                        so isProviderInstalled() is true and all 9 MCP servers
#                        register against this codex — no CLI install at launch
#   - uv (+uvx)         Aria's Python-skill runner
#   - git, sshfs, fuse3 (git for projects; sshfs+fuse3 for the host→guest share)
#
# The REH is NOT compiled here — it is built on a clean runner by reh-build.yml
# and downloaded from the vm-assets release. Compiling VS Code AND running
# libguestfs in one job exhausted the runner (OOM/swap-thrash → "canceled").
# So: run "REH server (aria-reh)" FIRST, then this workflow.
#
# Each arch is customized on a NATIVE-arch runner (virt-customize runs commands
# inside the guest via the host-arch libguestfs appliance).
#
# NETWORK: the guest customization stays --no-network. Everything that needs a
# network (npm/curl/apt) runs on the HOST runner in the "Prepare Aria runtimes"
# step and is baked via --copy-in, then installed OFFLINE in the guest (dpkg -i,
# cp). This sidesteps the flaky libguestfs appliance network (passt) entirely.
name: VM image (base)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bake:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            os: ubuntu-24.04
            url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img
          # arm64 (the Mac image) is added once an arm64 REH tarball exists.
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Install libguestfs + qemu-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y libguestfs-tools qemu-utils

      # Clone only for .nvmrc (the Node version for codex). No compile here.
      - name: Clone Aria (for .nvmrc)
        run: |
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" aria-src

      # Reclaim disk for the image resize + downloads (no compile → no swap needed).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost /usr/local/graalvm || true
          df -h /

      # The REH server, built by reh-build.yml and published to vm-assets. Extracts
      # to ./vscode-reh-linux-<arch>, baked in below.
      - name: Download prebuilt REH (from reh-build.yml)
        run: |
          gh release download vm-assets-v1 -p "aria-reh-linux-${{ matrix.arch }}.tar.gz" --clobber
          tar -xzf "aria-reh-linux-${{ matrix.arch }}.tar.gz"
          test -d "vscode-reh-linux-${{ matrix.arch }}" \
            || { echo "::error::REH tarball missing — run 'REH server (aria-reh)' workflow first"; exit 1; }

      # Node for codex (an npm package) inside the guest; baked in via --copy-in.
      - name: Fetch Node from .nvmrc
        run: |
          V="$(tr -d '[:space:]' < aria-src/.nvmrc)"
          F="node-v$V-linux-${{ matrix.arch }}"
          curl -fsSL "https://nodejs.org/dist/v$V/$F.tar.xz" | tar -xJ
          echo "ARIA_NODE_DIR=$PWD/$F" >> "$GITHUB_ENV"

      # Aria's runtimes, prepared on the HOST runner (which HAS network) and baked
      # via --copy-in below, so the guest install is fully OFFLINE (no passt).
      #   - codex (@openai/codex) + claude (@anthropic-ai/claude-code): npm CLIs.
      #     Host and guest are both linux-x64, so any native optionalDependencies
      #     match. Installed to /usr/local in the guest — the FIRST dir
      #     headlessCli.providerDirs()/codexMcp CODEX_CANDIDATES probe — so
      #     isProviderInstalled() is true with zero guest-side install, and all 9
      #     MCP servers register (`codex mcp add`) against this baked codex.
      #   - uv (+uvx): Aria's Python-skill runner.
      #   - git + sshfs + fuse3: .deb closure resolved in a clean ubuntu:24.04
      #     container (same family as the cloud image); installed offline via
      #     `dpkg -i`. sshfs+fuse3 back the host→guest project share.
      - name: Prepare Aria runtimes on host (codex, claude, uv, apt debs)
        run: |
          set -euxo pipefail
          export PATH="$ARIA_NODE_DIR/bin:$PATH"
          node --version && npm --version

          mkdir -p cli-prefix
          npm install -g --prefix "$PWD/cli-prefix" @openai/codex @anthropic-ai/claude-code
          echo '--- cli-prefix layout ---'
          find cli-prefix -maxdepth 2 -mindepth 1 | sort
          echo '--- cli-prefix/bin ---'
          ls -la cli-prefix/bin
          # Make the global-bin symlinks RELATIVE so the whole tree relocates cleanly
          # to /opt/cli-prefix in the guest (npm may emit host-absolute links, which
          # would dangle after copy-in). `test -e` follows the link → asserts it still
          # resolves on the host after the rewrite.
          for b in cli-prefix/bin/*; do
            [ -L "$b" ] || continue
            ln -sfr "$(readlink -f "$b")" "$b"
          done
          test -e cli-prefix/bin/codex
          test -e cli-prefix/bin/claude

          mkdir -p uvdir uvtmp
          curl -fsSL https://github.com/astral-sh/uv/releases/latest/download/uv-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C uvtmp
          echo '--- uv archive tree ---'
          find uvtmp -maxdepth 2 -mindepth 1 | sort
          find uvtmp -type f \( -name uv -o -name uvx \) -exec cp {} uvdir/ \;
          chmod +x uvdir/uv uvdir/uvx 2>/dev/null || true
          echo '--- uvdir ---'
          ls -la uvdir
          test -f uvdir/uv

          mkdir -p debs
          docker run --rm -v "$PWD/debs:/debs" ubuntu:24.04 bash -c '
            set -e
            apt-get update
            apt-get install -y --download-only -o Dir::Cache::archives=/debs git sshfs fuse3
            chmod -R a+rX /debs
          '
          ls -la debs

      - name: Download Ubuntu cloud image
        run: curl -fSL "${{ matrix.url }}" -o base.qcow2

      # docker's STATIC binaries, fetched on the HOST and baked with --copy-in
      # (needs no appliance network).
      - name: Prepare docker static binaries (host)
        run: |
          case "${{ matrix.arch }}" in
            arm64) DARCH=aarch64 ;;
            x64)   DARCH=x86_64 ;;
          esac
          DOCKER_VER=27.5.1
          curl -fsSL "https://download.docker.com/linux/static/stable/${DARCH}/docker-${DOCKER_VER}.tgz" -o docker.tgz
          tar -xzf docker.tgz   # -> ./docker/{dockerd,docker,containerd,runc,...}

      - name: Bake docker + aria-reh + runtimes into the image
        env:
          LIBGUESTFS_BACKEND: direct
        run: |
          set -euxo pipefail
          sudo chmod 0644 /boot/vmlinuz-* || true
          # The cloud image's root fs is only ~3.5G. Baking the runtimes
          # (codex/claude node_modules + uv + git/sshfs) fills it, leaving cloud-init
          # NO room on first boot → "No space left on device" at /var/lib/cloud →
          # cloud-init-local + networkd fail → sshd never comes up → the resolver
          # times out "waiting for the VM to become reachable". `qemu-img resize`
          # only grows the DISK, not the partition/fs, and cloud-init's growpart
          # can't run once the fs is already full. So expand the root partition+fs
          # HERE, at bake time, before copying anything in.
          #
          # Expand to ONLY 8G (not 30G): just enough for the runtimes + cloud-init
          # headroom. The user's overlay is created at ${diskGB}G (60G, see
          # vmLauncher) backing this base, and cloud-init growpart expands the 8G
          # partition to fill it on first boot — exactly like v3. A 30G expand grew
          # the qcow2 past GitHub's 2GB release-asset limit (ext4 metadata); 8G +
          # the qemu-img convert compaction below keeps the published file well under.
          qemu-img create -f qcow2 expanded.qcow2 8G
          virt-resize --expand /dev/sda1 base.qcow2 expanded.qcow2
          mv -f expanded.qcow2 base.qcow2

          printf '[Unit]\nDescription=Docker Application Container Engine\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nType=simple\nExecStart=/usr/local/bin/dockerd\nRestart=always\nRestartSec=2\n\n[Install]\nWantedBy=multi-user.target\n' > docker.service

          # --no-network: everything that needs a network was fetched on the HOST
          # (Prepare Aria runtimes step) and is baked in via --copy-in below, then
          # installed OFFLINE here (dpkg -i, cp). No apt/npm/curl runs in the guest,
          # so the flaky appliance network (passt) is never touched.
          sudo -E virt-customize -a base.qcow2 --no-network \
            --copy-in docker/dockerd:/usr/local/bin/ \
            --copy-in docker/docker:/usr/local/bin/ \
            --copy-in docker/containerd:/usr/local/bin/ \
            --copy-in docker/containerd-shim-runc-v2:/usr/local/bin/ \
            --copy-in docker/ctr:/usr/local/bin/ \
            --copy-in docker/runc:/usr/local/bin/ \
            --copy-in docker/docker-init:/usr/local/bin/ \
            --copy-in docker/docker-proxy:/usr/local/bin/ \
            --copy-in docker.service:/etc/systemd/system/ \
            --copy-in "${ARIA_NODE_DIR}:/opt/" \
            --copy-in "vscode-reh-linux-${{ matrix.arch }}:/opt/" \
            --copy-in cli-prefix:/opt/ \
            --copy-in uvdir:/opt/ \
            --copy-in debs:/opt/ \
            --run-command 'mv /opt/vscode-reh-linux-'"${{ matrix.arch }}"' /opt/aria-reh' \
            --run-command 'ln -sf /opt/aria-reh/bin/aria-reh /usr/local/bin/aria-reh' \
            --run-command 'NODE_DIR=$(ls -d /opt/node-v* | head -1); ln -sf "$NODE_DIR/bin/node" /usr/local/bin/node; ln -sf "$NODE_DIR/bin/npm" /usr/local/bin/npm; ln -sf "$NODE_DIR/bin/npx" /usr/local/bin/npx' \
            --run-command 'groupadd -f docker || true' \
            --run-command 'systemctl enable docker.service || true' \
            --run-command 'systemctl enable ssh || systemctl enable sshd || true' \
            --run-command 'mkdir -p /etc/default/grub.d && echo "GRUB_CMDLINE_LINUX_DEFAULT=\"console=tty1 console=ttyS0 console=hvc0\"" > /etc/default/grub.d/99-aria-console.cfg || true' \
            --run-command 'update-grub || true' \
            --run-command '/usr/local/bin/docker --version || true' \
            --run-command '/usr/local/bin/aria-reh --version || true' \
            --run-command 'ls -la /opt/cli-prefix/bin /opt/cli-prefix/lib/node_modules 2>&1 | head -40 || true' \
            --run-command 'for b in /opt/cli-prefix/bin/*; do ln -sf "$b" "/usr/local/bin/$(basename "$b")"; done' \
            --run-command '{ cp /opt/uvdir/uv /usr/local/bin/ && chmod +x /usr/local/bin/uv; } || true' \
            --run-command '{ [ -f /opt/uvdir/uvx ] && cp /opt/uvdir/uvx /usr/local/bin/ && chmod +x /usr/local/bin/uvx; } || true' \
            --run-command 'dpkg -i /opt/debs/*.deb || true' \
            --run-command 'rm -rf /opt/uvdir /opt/debs' \
            --run-command '/usr/local/bin/codex --version || true' \
            --run-command '/usr/local/bin/claude --version || true' \
            --run-command '/usr/local/bin/uv --version || true' \
            --run-command 'command -v sshfs && command -v git || true'
          # Compress via convert (-c). The cloud image ships as a COMPRESSED qcow2;
          # an uncompressed convert (-O qcow2 without -c) decompressed the whole
          # image and made it BIGGER, still blowing GitHub's 2GB release-asset limit
          # even at 8G. -c compresses everything (runtime data + the zeroed 8G ext4
          # metadata) so the published asset lands well under 2GB. qemu reads a
          # compressed qcow2 backing file fine — the per-boot overlay stays writable.
          qemu-img convert -O qcow2 -c base.qcow2 "aria-vm-${{ matrix.arch }}.qcow2"
          ls -lh "aria-vm-${{ matrix.arch }}.qcow2"

      - name: Publish to vm-assets release
        run: |
          gh release create vm-assets-v1 --title "VM assets" \
            --notes "Portable QEMU + base image + REH for Aria's built-in run environment." 2>/dev/null || true
          gh release upload vm-assets-v1 "aria-vm-${{ matrix.arch }}.qcow2" --clobber
