# Publishes the base VM disk image the built-in Run environment downloads
# (extensions/aria-autopipe/src/vm/provisioner.ts → aria-vm-<arch>.qcow2).
#
# v2 BAKES docker into the image with virt-customize so the guest has a working
# docker daemon the moment sshd is up. v1 relied on the cloud-init seed running
# `get.docker.com` on first boot, which raced the first pipeline (autopipe
# connected and ran `docker build` before the install finished → "docker not
# found"). The seed still installs docker as an idempotent fallback for any
# image that lacks it, but the baked image is a no-op for that step.
#
# Each arch is customized on a NATIVE-arch runner: virt-customize runs the
# install commands INSIDE the guest via the libguestfs appliance, which is the
# host arch - an x64 runner cannot execute the arm64 docker binaries. GitHub's
# hosted arm64 Linux runner (ubuntu-24.04-arm) handles the arm64 image.
#
# Run manually from the Actions tab (workflow_dispatch).
name: VM image (base)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bake:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            os: ubuntu-24.04-arm
            url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img
          - arch: x64
            os: ubuntu-24.04
            url: https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img
    runs-on: ${{ matrix.os }}
    steps:
      - name: Install libguestfs + qemu-utils
        run: |
          sudo apt-get update
          sudo apt-get install -y libguestfs-tools qemu-utils

      - name: Download Ubuntu cloud image
        run: curl -fSL "${{ matrix.url }}" -o base.qcow2

      - name: Bake docker into the image
        env:
          # GitHub runners have no /dev/kvm; run the libguestfs appliance under
          # TCG. Also make the host kernel readable so the appliance can boot
          # (a well-known libguestfs-on-Actions requirement).
          LIBGUESTFS_BACKEND: direct
        run: |
          set -euxo pipefail
          sudo chmod 0644 /boot/vmlinuz-* || true
          # libguestfs >= 1.54 defaults to passt for the appliance's user-mode
          # network, which fails on GitHub runners ("passt exited with status 1")
          # and breaks the --run-command docker install (needs internet). Hide
          # passt so libguestfs falls back to qemu's built-in SLIRP user net.
          sudo mv /usr/bin/passt /usr/bin/passt.disabled 2>/dev/null || true
          # Give docker room at runtime; cloud-init growpart expands the root
          # partition to fill this on first boot.
          qemu-img resize base.qcow2 20G
          # Install docker + enable it so the daemon is up right after boot.
          # groupadd here so the seed's `usermod -aG docker aria` succeeds.
          # Route the kernel console to hvc0 too (vfkit's virtio console) while
          # keeping ttyS0 (qemu's serial) - so boot logs are visible on BOTH
          # backends. Without hvc0 a vfkit boot is a black box.
          # The guest's /etc/resolv.conf points at the systemd-resolved stub
          # (127.0.0.53), which isn't running inside the appliance, so DNS fails
          # ("Could not resolve host"). Point it at public DNS reachable through
          # SLIRP's NAT before anything that needs the network. Download the
          # docker script to a file first so a fetch failure errors loudly
          # instead of being swallowed by the `| sh` pipe.
          sudo -E virt-customize -a base.qcow2 \
            --run-command 'rm -f /etc/resolv.conf; printf "nameserver 8.8.8.8\nnameserver 1.1.1.1\n" > /etc/resolv.conf' \
            --run-command 'curl -fsSL https://get.docker.com -o /tmp/get-docker.sh && sh /tmp/get-docker.sh' \
            --run-command 'groupadd -f docker' \
            --run-command 'systemctl enable docker.service containerd.service' \
            --run-command 'echo "GRUB_CMDLINE_LINUX_DEFAULT=\"console=tty1 console=ttyS0 console=hvc0\"" > /etc/default/grub.d/99-aria-console.cfg' \
            --run-command 'update-grub' \
            --run-command 'docker --version'
          mv base.qcow2 "aria-vm-${{ matrix.arch }}.qcow2"

      - name: Publish to vm-assets release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create vm-assets-v1 --title "VM assets" \
            --notes "Portable QEMU + base image for Aria's built-in run environment." 2>/dev/null || true
          gh release upload vm-assets-v1 "aria-vm-${{ matrix.arch }}.qcow2" --clobber
