# Builds the REH server (aria-reh = product.serverApplicationName) from source on
# a CLEAN runner and uploads it to the vm-assets release, so vm-image.yml can just
# download + --copy-in it instead of compiling VS Code inside the libguestfs job.
#
# WHY split: compiling VS Code AND running libguestfs in one job (vm-image.yml)
# exhausted the runner — an x64 run was "canceled" mid-compile (OOM → swap
# thrashing → unresponsive). Here the compile gets a runner to itself (no
# libguestfs, no cloud image), the same footing release-app.yml builds the
# desktop app on.
#
# Run this FIRST (workflow_dispatch on the branch), then run "VM image (base)".
# Output: aria-reh-linux-<arch>.tar.gz on the vm-assets-v1 release.
name: REH server (aria-reh)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            os: [self-hosted, Linux, X64]
          # arm64 (the Mac-side REH) is added once an arm64 self-hosted runner
          # exists. For now the x64 REH covers the Windows path.
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Clone at this branch/tag
        run: |
          # A self-hosted runner REUSES its work dir across runs, so a leftover
          # checkout makes `git clone .` fail ("destination path '.' already exists
          # and is not an empty directory"). Wipe the job work dir first. This runs
          # inside _work/<repo>/<repo>, NOT your home dir, so it is safe.
          rm -rf ./* ./.[!.]* 2>/dev/null || true
          git clone --depth 1 --branch "${GITHUB_REF_NAME}" \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .

      # NOTE: native-build deps must be PRE-INSTALLED on the self-hosted runner by
      # an admin ONCE (the runner user has no sudo). Run this on the machine with
      # a root/sudo account before the first build:
      #   sudo apt-get install -y git curl tar build-essential \
      #     libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev fakeroot
      # (kerberos needs libkrb5-dev's gssapi/gssapi.h, keytar needs libsecret-1-dev.)

      # Self-hosted runner is YOUR machine — do NOT delete files or touch swap
      # (unlike the disposable GitHub-hosted runners). Just report resources so
      # RAM/arch are visible in the log; the compile relies on the machine having
      # enough RAM (16GB+ recommended).
      - name: Show runner resources
        run: |
          echo '--- mem ---'; free -h
          echo '--- disk ---'; df -h .
          echo '--- arch ---'; uname -m

      - name: Install Node from .nvmrc
        run: |
          V="$(tr -d '[:space:]' < .nvmrc)"
          F="node-v$V-linux-${{ matrix.arch }}"
          curl -fsSL "https://nodejs.org/dist/v$V/$F.tar.xz" | tar -xJ
          echo "$PWD/$F/bin" >> "$GITHUB_PATH"

      - name: Build REH + bundled Aria extensions
        run: |
          ulimit -n 65536 2>/dev/null || ulimit -n 10240 2>/dev/null || true
          # The self-hosted runner has no system -dev packages (no sudo). When the
          # runner is launched from an activated conda env that has krb5 / libx11 /
          # libxkbfile / libsecret, point node-gyp/gcc at those headers+libs so the
          # native modules (kerberos, keytar, native-keymap) compile. Harmless if
          # CONDA_PREFIX is unset (e.g. system -dev packages present instead).
          if [ -n "$CONDA_PREFIX" ]; then
            export CPATH="$CONDA_PREFIX/include:${CPATH:-}"
            export LIBRARY_PATH="$CONDA_PREFIX/lib:${LIBRARY_PATH:-}"
            export LD_LIBRARY_PATH="$CONDA_PREFIX/lib:${LD_LIBRARY_PATH:-}"
            export PKG_CONFIG_PATH="$CONDA_PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
            echo "Using conda headers from $CONDA_PREFIX"
          fi
          # The compile died at ~3.3GB with a NewSpace (young-gen) OOM even though
          # the machine has plenty of RAM — node's default semi-space is too small
          # for this build, and gulp only sets --max-old-space-size. Raise BOTH via
          # NODE_OPTIONS so every node the build spawns (workers included) gets a
          # big heap AND a big new space. This machine has ~750GB, so be generous.
          export NODE_OPTIONS="--max-old-space-size=16384 --max-semi-space-size=1024"
          npm install
          # Compile Aria extensions so their output ships in the REH (gulp packaging
          # only COPIES existing output, never compiles).
          for d in extensions/aria-*/; do
            if [ -f "$d/build.mjs" ]; then
              (cd "$d" && npm install && node build.mjs)
            fi
          done
          transpile=""
          for d in extensions/aria-*/; do
            name="$(basename "$d")"
            [ -f "$d/build.mjs" ] || { [ -f "$d/tsconfig.json" ] && transpile="$transpile transpile-extension:$name"; }
          done
          [ -n "$transpile" ] && npm run gulp -- $transpile || true
          # NON-min build (no `-min`): the -min variant runs the mangler/minifier,
          # which is memory-heavy (11k classes) and OOM-KILLED the runner even with
          # an 8GB heap — failed with no error line because the kernel SIGKILL'd it
          # before node could report "heap out of memory". The non-min server is
          # larger but fully functional (fine for baking into the image), and the
          # output folder is the SAME (vscode-reh-linux-<arch>), so vm-image.yml is
          # unchanged. Bump back to -min only on a larger runner.
          # The REH server bundle → ../vscode-reh-linux-<arch> (repo parent).
          npm run gulp vscode-reh-linux-${{ matrix.arch }}
          test -d "../vscode-reh-linux-${{ matrix.arch }}" \
            || { echo "::error::REH output dir missing"; exit 1; }
          "../vscode-reh-linux-${{ matrix.arch }}/bin/aria-reh" --version || true

      - name: Package + upload to vm-assets
        run: |
          tar -C .. -czf "aria-reh-linux-${{ matrix.arch }}.tar.gz" "vscode-reh-linux-${{ matrix.arch }}"
          gh release create vm-assets-v1 --title "VM assets" \
            --notes "Portable QEMU + base image + REH for Aria's built-in run environment." 2>/dev/null || true
          gh release upload vm-assets-v1 "aria-reh-linux-${{ matrix.arch }}.tar.gz" --clobber
