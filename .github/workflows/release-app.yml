# Builds the Qoka desktop app and attaches installers to a GitHub Release when a
# version tag is pushed (e.g. `git tag v1.2.3 && git push origin v1.2.3`).
# Structure follows autopipe-org/autopipe's release.yml (tag trigger + version
# gate + OS matrix + release upload), but the build is VS Code's own gulp tasks.
#
# Uses NO third-party actions (repo policy is `local_only`): the repo is cloned
# by hand, Node comes straight from nodejs.org, and releases are managed with the
# preinstalled `gh` CLI.
#   macOS  → Qoka.app in a .dmg  (build/darwin/create-dmg.ts, UNSIGNED)
#   Windows→ per-user AriaSetup .exe (Inno Setup, UNSIGNED)
# QEMU + the VM image ship separately (vm-assets.yml / vm-image.yml).
#
# NOTE: the VS Code from-source build in CI is heavy and finicky — first runs
# will need tuning (task names, output paths, node-gyp toolchains). Unsigned
# builds warn on Gatekeeper (macOS: right-click → Open) / SmartScreen (Windows).
name: Release (app)

on:
  workflow_dispatch:
  push:
    # Qoka release tags carry Qoka's OWN version (aria-v0.1.0), independent of
    # package.json's version, which stays at the forked VS Code API version
    # (1.x) for extension compatibility.
    tags: ['qoka-v*']

permissions:
  contents: write

jobs:
  verify-version:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Clone at tag
        run: git clone --depth 1 --branch "${GITHUB_REF_NAME}" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
      - name: Tag must match Qoka version; API version must stay 1.x
        run: |
          TAG="${GITHUB_REF_NAME#qoka-v}"
          ARIA=$(jq -r '.ariaVersion' product.json)
          PKG=$(jq -r '.version' package.json)
          if [ "$TAG" != "$ARIA" ]; then
            echo "::error::Tag qoka-v$TAG does not match product.json ariaVersion=$ARIA. Bump product.json ariaVersion (or retag) before releasing."
            exit 1
          fi
          case "$PKG" in
            1.*) : ;;
            *) echo "::error::package.json version must stay 1.x for extension compatibility (got $PKG). Do NOT set it to the Qoka version."; exit 1 ;;
          esac
          echo "Version OK: Qoka $TAG (vscode API $PKG)"

  build:
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          # WSL BRANCH ONLY: Windows-only builds while iterating on the WSL
          # runtime. RESTORE the macOS (and other) entries before merging this
          # branch to main / doing a full cross-platform release.
          # - { os: macos-14, plat: darwin, arch: arm64, nodearch: arm64 }
          - { os: windows-latest, plat: win32, arch: x64, nodearch: x64 }
          # TEMPORARY: only macOS arm64 + Windows are built for now, to test on
          # both machines. RESTORE the two entries below before a full
          # cross-platform release.
          # Intel .dmg is cross-built on the ARM runner (GitHub's macos-13
          # Intel runner has ~zero capacity and hangs). Node stays arm64 to
          # drive the build; npm_config_arch=x64 targets x64 native modules.
          # - { os: macos-14, plat: darwin, arch: x64, nodearch: arm64 }
          # - { os: ubuntu-22.04, plat: linux, arch: x64, nodearch: x64 }
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      # @vscode/ripgrep (and other prebuilt downloaders) query the GitHub API;
      # unauthenticated CI hits the 60/hr limit and 403s. Authenticate it.
      GITHUB_TOKEN: ${{ github.token }}
      npm_config_arch: ${{ matrix.arch }}
      npm_config_target_arch: ${{ matrix.arch }}
    steps:
      - name: Clone
        shell: bash
        run: git clone --branch "${GITHUB_REF_NAME}" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .

      # Node comes straight from nodejs.org (no external action). Windows uses
      # PowerShell + Expand-Archive because Git Bash's tar is GNU tar and can't
      # read .zip. macOS/Linux use the .tar.xz.
      - name: Install Node from .nvmrc (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          V="$(tr -d '[:space:]' < .nvmrc)"
          case "${{ runner.os }}" in
            macOS) OS=darwin ;;
            Linux) OS=linux ;;
          esac
          F="node-v$V-$OS-${{ matrix.nodearch }}"
          curl -fsSL "https://nodejs.org/dist/v$V/$F.tar.xz" | tar -xJ
          echo "$PWD/$F/bin" >> "$GITHUB_PATH"

      - name: Install Node from .nvmrc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $V = (Get-Content .nvmrc -Raw).Trim()
          $F = "node-v$V-win-x64"
          curl.exe -fsSL "https://nodejs.org/dist/v$V/$F.zip" -o node.zip
          Expand-Archive -Path node.zip -DestinationPath . -Force
          "$PWD\$F" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          # Retries + timeouts so a flaky apt mirror doesn't hang the job.
          sudo apt-get -o Acquire::Retries=3 -o Acquire::http::Timeout=30 update
          sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev fakeroot

      # preinstall.ts checks default VS install paths and can miss the runner's
      # edition; point it straight at the real install via vswhere so the
      # C/C++ toolchain check passes.
      - name: Locate Visual Studio (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "Visual Studio not found via vswhere" }
          "vs2022_install=$vs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Found Visual Studio at: $vs"

      # patchWin32DependenciesTask strips/verifies Authenticode signatures with
      # signtool.exe (from the Windows SDK), which isn't on PATH by default. VS
      # Code's own pipeline adds it too; without it the build fails ENOENT.
      - name: Add Windows SDK (signtool) to PATH
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" -ErrorAction SilentlyContinue |
                 Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $sdk) { throw "signtool.exe not found in Windows Kits" }
          Write-Host "Found signtool at: $($sdk.FullName)"
          Split-Path $sdk.FullName | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # node-gyp on the runner picked Python 3.14 (very new), which crashes some
      # native builds (tree-sitter) with 0xC0000409. Point npm at a stable 3.12/
      # 3.11 from the toolcache when available.
      - name: Pin a node-gyp-friendly Python (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $py = Get-ChildItem "C:\hostedtoolcache\windows\Python\3.12.*\x64\python.exe" -ErrorAction SilentlyContinue |
                Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $py) {
            $py = Get-ChildItem "C:\hostedtoolcache\windows\Python\3.11.*\x64\python.exe" -ErrorAction SilentlyContinue |
                  Sort-Object FullName -Descending | Select-Object -First 1
          }
          if ($py) {
            Write-Host "Using Python: $($py.FullName)"
            "npm_config_python=$($py.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            Write-Host "No 3.11/3.12 Python in toolcache; keeping default."
          }
          # Run the postinstall's per-directory npm installs one at a time: parallel
          # child processes crash the Windows build with 0xC0000409.
          "VSCODE_POSTINSTALL_CONCURRENCY=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Use `npm install`, not `npm ci`: some Qoka extensions (aria-autopipe,
      # aria-vcs) ship without a committed package-lock.json, and the root
      # postinstall runs the same command in every workspace dir — `npm ci`
      # aborts there, `npm install` does not. Matches the local dev build.
      - name: Install dependencies
        shell: bash
        run: |
          # The root postinstall runs `npm install` in every bundled extension;
          # some pull large dep trees. Raise the macOS open-files limit (default
          # 256) so those concurrent installs don't EMFILE. No-op on Windows Git
          # Bash / Linux.
          ulimit -n 65536 2>/dev/null || ulimit -n 10240 2>/dev/null || true
          npm install

      # Build every bundled Qoka extension so its compiled output ships in the
      # app. The gulp packaging only COPIES existing output (fromLocalNormal via
      # vsce.listFiles) — it never compiles TypeScript — so a fresh CI clone
      # otherwise ships these with no out/extension.js and they fail to activate.
      # esbuild extensions (build.mjs) emit dist/. Plain-tsc extensions are
      # transpiled to out/ via gulp (swc, no type-check) — the same path the dev
      # build uses; a plain `tsc -p ./` instead conflicts because both
      # @types/vscode and src/vscode-dts/vscode.d.ts declare the global API.
      - name: Build Qoka extensions
        shell: bash
        run: |
          set -e
          # macOS runners default to a low open-files limit (ulimit -n 256); the
          # esbuild bundle + npm install of the heavier extensions (BlockNote pulls
          # a large dep tree) blows past it with EMFILE. Raise it for this shell and
          # its children. No-op / harmless on Windows Git Bash and Linux.
          ulimit -n 65536 2>/dev/null || ulimit -n 10240 2>/dev/null || true
          transpile_tasks=""
          for d in extensions/aria-*/; do
            name="$(basename "$d")"
            if [ -f "$d/build.mjs" ]; then
              echo "== $name (esbuild) =="
              (cd "$d" && npm install && node build.mjs)
            elif [ -f "$d/tsconfig.json" ]; then
              transpile_tasks="$transpile_tasks transpile-extension:$name"
            fi
          done
          if [ -n "$transpile_tasks" ]; then
            echo "== gulp$transpile_tasks =="
            npm run gulp -- $transpile_tasks
          fi

      # Full task (compile -> minify -> package). The `-min-ci` variant only
      # packages and assumes out-vscode-min already exists (VS Code's pipeline
      # builds it in a separate upstream job); we do everything in one job.
      # Split by OS so we can raise the open-files limit on macOS/Linux (the gulp
      # build + vsce.listFiles walk many files at once → EMFILE on macOS) while
      # leaving the Windows path on its default shell.
      - name: Build app tree (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          ulimit -n 65536 2>/dev/null || ulimit -n 10240 2>/dev/null || true
          npm run gulp vscode-${{ matrix.plat }}-${{ matrix.arch }}-min
      - name: Build app tree (Windows)
        if: runner.os == 'Windows'
        run: npm run gulp vscode-${{ matrix.plat }}-${{ matrix.arch }}-min

      - name: Package macOS (.dmg)
        if: runner.os == 'macOS'
        shell: bash
        env:
          VSCODE_ARCH: ${{ matrix.arch }}
          VSCODE_QUALITY: stable
        run: |
          mkdir -p artifacts
          # First arg is the PARENT dir; create-dmg.ts appends VSCode-darwin-<arch>.
          node --experimental-strip-types build/darwin/create-dmg.ts \
            "$PWD/.." "$PWD/artifacts"

      - name: Package Windows (.exe)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          npm run gulp vscode-win32-${{ matrix.arch }}-inno-updater
          npm run gulp vscode-win32-${{ matrix.arch }}-user-setup
          mkdir -p artifacts
          cp .build/win32-${{ matrix.arch }}/user-setup/*.exe artifacts/ || true

      - name: Package Linux (.deb + .tar.gz)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p artifacts
          # Universal fallback first, so Linux always ships something even if the
          # .deb step has trouble.
          tar -czf "artifacts/Qoka-linux-${{ matrix.arch }}.tar.gz" \
            -C "$PWD/.." "VSCode-linux-${{ matrix.arch }}"
          # .deb for Debian/Ubuntu (double-click / `apt install ./x.deb`). Run
          # prepare THEN build as SEPARATE gulp invocations: a single combined run
          # executes them in parallel, and build-deb then starts before prepare-deb
          # has created its working dir (spawn /bin/sh ENOENT). Best-effort.
          if npm run gulp -- vscode-linux-${{ matrix.arch }}-prepare-deb \
             && npm run gulp -- vscode-linux-${{ matrix.arch }}-build-deb; then
            find .build/linux/deb -name "*.deb" -exec cp {} artifacts/ \;
          else
            echo "::warning::.deb build failed — shipping the tar.gz only."
          fi

      - name: Attach installers to the tag's release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#qoka-v}"
          gh release create "${GITHUB_REF_NAME}" --title "Qoka ${VER}" --notes "Qoka ${VER}" 2>/dev/null || true
          for f in artifacts/*; do gh release upload "${GITHUB_REF_NAME}" "$f" --clobber; done
