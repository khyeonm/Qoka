# Builds the Aria desktop app and attaches installers to a GitHub Release when a
# version tag is pushed (e.g. `git tag v1.2.3 && git push origin v1.2.3`).
# Structure follows autopipe-org/autopipe's release.yml (tag trigger + version
# gate + OS matrix + release upload), but the build is VS Code's own gulp tasks.
#
# Uses NO third-party actions (repo policy is `local_only`): the repo is cloned
# by hand, Node comes straight from nodejs.org, and releases are managed with the
# preinstalled `gh` CLI.
#   macOS  → Aria.app in a .dmg  (build/darwin/create-dmg.ts, UNSIGNED)
#   Windows→ per-user AriaSetup .exe (Inno Setup, UNSIGNED)
# QEMU + the VM image ship separately (vm-assets.yml / vm-image.yml).
#
# NOTE: the VS Code from-source build in CI is heavy and finicky — first runs
# will need tuning (task names, output paths, node-gyp toolchains). Unsigned
# builds warn on Gatekeeper (macOS: right-click → Open) / SmartScreen (Windows).
name: Release (app)

on:
  workflow_dispatch:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  verify-version:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Clone at tag
        run: git clone --depth 1 --branch "${GITHUB_REF_NAME}" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .
      - name: Tag must match package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(jq -r '.version' package.json)
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Version mismatch — tag=$TAG but package.json=$PKG. Bump package.json version to match the tag (or retag) before releasing."
            exit 1
          fi
          echo "Version OK: tag=$TAG == package.json=$PKG"

  build:
    needs: [verify-version]
    if: always() && (needs.verify-version.result == 'success' || needs.verify-version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, plat: darwin, arch: arm64, nodearch: arm64 }
          # Intel .dmg is cross-built on the ARM runner (GitHub's macos-13
          # Intel runner has ~zero capacity and hangs). Node stays arm64 to
          # drive the build; npm_config_arch=x64 targets x64 native modules.
          - { os: macos-14, plat: darwin, arch: x64, nodearch: arm64 }
          - { os: windows-latest, plat: win32, arch: x64, nodearch: x64 }
          - { os: ubuntu-22.04, plat: linux, arch: x64, nodearch: x64 }
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      # @vscode/ripgrep (and other prebuilt downloaders) query the GitHub API;
      # unauthenticated CI hits the 60/hr limit and 403s. Authenticate it.
      GITHUB_TOKEN: ${{ github.token }}
      npm_config_arch: ${{ matrix.arch }}
      npm_config_target_arch: ${{ matrix.arch }}
    steps:
      - name: Clone
        shell: bash
        run: git clone --branch "${GITHUB_REF_NAME}" "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" .

      # Node comes straight from nodejs.org (no external action). Windows uses
      # PowerShell + Expand-Archive because Git Bash's tar is GNU tar and can't
      # read .zip. macOS/Linux use the .tar.xz.
      - name: Install Node from .nvmrc (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          V="$(tr -d '[:space:]' < .nvmrc)"
          case "${{ runner.os }}" in
            macOS) OS=darwin ;;
            Linux) OS=linux ;;
          esac
          F="node-v$V-$OS-${{ matrix.nodearch }}"
          curl -fsSL "https://nodejs.org/dist/v$V/$F.tar.xz" | tar -xJ
          echo "$PWD/$F/bin" >> "$GITHUB_PATH"

      - name: Install Node from .nvmrc (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $V = (Get-Content .nvmrc -Raw).Trim()
          $F = "node-v$V-win-x64"
          curl.exe -fsSL "https://nodejs.org/dist/v$V/$F.zip" -o node.zip
          Expand-Archive -Path node.zip -DestinationPath . -Force
          "$PWD\$F" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxkbfile-dev libsecret-1-dev libkrb5-dev

      # preinstall.ts checks default VS install paths and can miss the runner's
      # edition; point it straight at the real install via vswhere so the
      # C/C++ toolchain check passes.
      - name: Locate Visual Studio (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "Visual Studio not found via vswhere" }
          "vs2022_install=$vs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Found Visual Studio at: $vs"

      # Use `npm install`, not `npm ci`: some Aria extensions (aria-autopipe,
      # aria-vcs) ship without a committed package-lock.json, and the root
      # postinstall runs the same command in every workspace dir — `npm ci`
      # aborts there, `npm install` does not. Matches the local dev build.
      - name: Install dependencies
        run: npm install

      - name: Build self-bundling extensions
        shell: bash
        run: |
          for e in aria-notes aria-memory aria-authentication; do
            (cd "extensions/$e" && npm install && node build.mjs)
          done

      # Full task (compile -> minify -> package). The `-min-ci` variant only
      # packages and assumes out-vscode-min already exists (VS Code's pipeline
      # builds it in a separate upstream job); we do everything in one job.
      - name: Build app tree
        run: npm run gulp vscode-${{ matrix.plat }}-${{ matrix.arch }}-min

      - name: Package macOS (.dmg)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p artifacts
          node --experimental-strip-types build/darwin/create-dmg.ts \
            "$PWD/../VSCode-darwin-${{ matrix.arch }}" "$PWD/artifacts"

      - name: Package Windows (.exe)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          npm run gulp vscode-win32-${{ matrix.arch }}-inno-updater
          npm run gulp vscode-win32-${{ matrix.arch }}-user-setup
          mkdir -p artifacts
          cp .build/win32-${{ matrix.arch }}/user-setup/*.exe artifacts/ || true

      - name: Package Linux (.tar.gz)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p artifacts
          tar -czf "artifacts/Aria-linux-${{ matrix.arch }}.tar.gz" \
            -C "$PWD/.." "VSCode-linux-${{ matrix.arch }}"

      - name: Attach installers to the tag's release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          gh release create "${GITHUB_REF_NAME}" --title "${GITHUB_REF_NAME}" --notes "Aria ${GITHUB_REF_NAME}" 2>/dev/null || true
          for f in artifacts/*; do gh release upload "${GITHUB_REF_NAME}" "$f" --clobber; done
