# Builds the PORTABLE QEMU that Aria's built-in Run environment downloads at
# runtime (extensions/aria-autopipe/src/vm/provisioner.ts). Users install nothing:
# qemu runs in-place from the app-data folder. Artifacts are attached to the
# `vm-assets-v1` release with names the provisioner expects:
#   qemu-<darwin|win32|linux>-<arm64|x64>.tar.gz  (layout: bin/, lib/, share/qemu/)
#
# NOTE: first runs will likely need small tweaks (brew/choco paths, dylib list).
# Trigger manually from the Actions tab (workflow_dispatch) or push a vm-assets-* tag.
name: VM assets (portable qemu)

on:
  workflow_dispatch:
  push:
    tags: ['vm-assets-*']

permissions:
  contents: write

jobs:
  qemu:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14        # Apple Silicon (native)
            plat: darwin
            arch: arm64
            qarch: aarch64
          - os: macos-14        # Intel, cross-produced on the ARM runner
            plat: darwin        # (the dedicated macos-13 runner has ~zero
            arch: x64           #  capacity and hangs forever). See build step.
            qarch: x86_64
          - os: windows-latest
            plat: win32
            arch: x64
            qarch: x86_64
          - os: ubuntu-22.04
            plat: linux
            arch: x64
            qarch: x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Build portable QEMU (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euxo pipefail
          # dylibbundler runs natively (arm64); otool/install_name_tool it
          # calls are universal, so it rewrites x86_64 Mach-O binaries fine.
          brew install dylibbundler
          if [ "${{ matrix.arch }}" = "x64" ]; then
            # Cross-produce Intel qemu on the Apple Silicon runner: install an
            # x86_64 Homebrew under Rosetta 2 and pull the Intel qemu bottle.
            # (Intel HVF uses the x86 code path - no ARM SME assertion - so the
            # latest qemu is fine here.)
            softwareupdate --install-rosetta --agree-to-license || true
            if [ ! -x /usr/local/bin/brew ]; then
              NONINTERACTIVE=1 arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
            fi
            BREW=/usr/local/bin/brew
            arch -x86_64 "$BREW" install qemu
          else
            BREW=brew
            # Latest qemu: HVF works on M1–M3 (no SME). Apple Silicon M4 has a qemu
            # HVF bug either way (old qemu → HV_BAD_ARGUMENT, new qemu → an SME
            # sysreg assertion), so pinning an old version buys nothing there; the
            # app's TCG software-emulation fallback covers M4. (A proper M4 fast
            # path means Apple's Virtualization.framework / vfkit, not qemu HVF.)
            brew install qemu
          fi
          QPREFIX=$("$BREW" --prefix qemu)
          # Homebrew symlinks every keg's libs into <prefix>/lib, so this is the
          # search path dylibbundler needs to locate keg-only deps like capstone.
          HBLIB=$("$BREW" --prefix)/lib
          OUT="$PWD/out"
          mkdir -p "$OUT/bin" "$OUT/lib" "$OUT/share/qemu"
          cp "$QPREFIX/bin/qemu-system-${{ matrix.qarch }}" "$OUT/bin/"
          cp "$QPREFIX/bin/qemu-img" "$OUT/bin/"
          cp -R "$QPREFIX/share/qemu/." "$OUT/share/qemu/"
          # Relocate every dependent dylib into out/lib and rewrite install names
          # to @executable_path/../lib so the binaries run from anywhere. The
          # `-s "$HBLIB"` search path is what lets dylibbundler actually COPY
          # keg-only libs (e.g. libcapstone) instead of rewriting the reference
          # but leaving the file behind - the bug that shipped a bundle missing
          # libcapstone.5.dylib so qemu died in dyld before it ever booted.
          dylibbundler -od -b \
            -x "$OUT/bin/qemu-system-${{ matrix.qarch }}" \
            -x "$OUT/bin/qemu-img" \
            -d "$OUT/lib" -p '@executable_path/../lib' -s "$HBLIB"
          # Belt-and-suspenders: copy any dylib still referenced under ../lib but
          # absent, resolving from Homebrew's lib dirs; iterate to a fixpoint so
          # transitive deps of the copied libs are covered too.
          for _pass in 1 2 3 4 5 6; do
            missing=0
            for f in "$OUT/bin/qemu-system-${{ matrix.qarch }}" "$OUT/bin/qemu-img" "$OUT"/lib/*.dylib; do
              [ -f "$f" ] || continue
              for name in $(otool -L "$f" | awk -F/ '/@executable_path\/\.\.\/lib\//{print $NF}' | awk '{print $1}'); do
                if [ ! -f "$OUT/lib/$name" ]; then
                  src=$(find -L "$HBLIB" /opt/homebrew/lib /usr/local/lib -maxdepth 1 -name "$name" 2>/dev/null | head -1)
                  if [ -n "$src" ]; then cp -L "$src" "$OUT/lib/$name"; missing=1; fi
                fi
              done
            done
            [ "$missing" = 0 ] && break
          done
          # dylibbundler's install_name_tool edits invalidate the code signature,
          # and macOS refuses HVF acceleration unless the binary is validly signed
          # AND carries the hypervisor entitlement - otherwise QEMU falls back to
          # slow TCG (or fails), which is what made the VM never come up. Ad-hoc
          # re-sign the bundled dylibs, then the binaries; qemu-system also gets
          # the hypervisor + library-validation-disable entitlements.
          printf '%s\n' \
            '<?xml version="1.0" encoding="UTF-8"?>' \
            '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
            '<plist version="1.0"><dict><key>com.apple.security.hypervisor</key><true/><key>com.apple.security.cs.disable-library-validation</key><true/></dict></plist>' \
            > "$PWD/hvf.entitlements"
          for f in "$OUT"/lib/*.dylib; do codesign --force --sign - "$f" || true; done
          codesign --force --sign - "$OUT/bin/qemu-img"
          codesign --force --sign - --entitlements "$PWD/hvf.entitlements" "$OUT/bin/qemu-system-${{ matrix.qarch }}"
          codesign --verify --verbose "$OUT/bin/qemu-system-${{ matrix.qarch }}" || true
          # Smoke test: a bundle that can't resolve its dylibs must FAIL the job,
          # not ship. `--version` exercises the full dyld load without needing
          # HVF; the x64 binary runs under Rosetta on the arm runner.
          "$OUT/bin/qemu-system-${{ matrix.qarch }}" --version
          "$OUT/bin/qemu-img" --version
          tar -czf "qemu-${{ matrix.plat }}-${{ matrix.arch }}.tar.gz" -C "$OUT" .

      - name: Build portable QEMU (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install qemu -y --no-progress
          $qdir = "C:\Program Files\qemu"
          $out = "$PWD\out"
          New-Item -ItemType Directory -Force -Path "$out\bin","$out\share\qemu" | Out-Null
          # On Windows qemu is a self-contained folder: exe + its DLLs + share/.
          Copy-Item "$qdir\qemu-system-${{ matrix.qarch }}.exe" "$out\bin\"
          Copy-Item "$qdir\qemu-img.exe" "$out\bin\" -ErrorAction SilentlyContinue
          Copy-Item "$qdir\*.dll" "$out\bin\"
          if (Test-Path "$qdir\share") { Copy-Item "$qdir\share\*" "$out\share\qemu\" -Recurse -Force -ErrorAction SilentlyContinue }
          else { Copy-Item "$qdir\*.bin","$qdir\*.fd","$qdir\*.rom","$qdir\keymaps" "$out\share\qemu\" -Recurse -Force -ErrorAction SilentlyContinue }
          tar -czf "qemu-${{ matrix.plat }}-${{ matrix.arch }}.tar.gz" -C "$out" .

      - name: Build portable QEMU (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 patchelf
          OUT="$PWD/out"
          mkdir -p "$OUT/bin" "$OUT/lib" "$OUT/share/qemu"
          cp "$(command -v qemu-system-${{ matrix.qarch }})" "$OUT/bin/"
          cp "$(command -v qemu-img)" "$OUT/bin/"
          cp -R /usr/share/qemu/. "$OUT/share/qemu/" || true
          # Copy shared libs and set rpath to $ORIGIN/../lib.
          for b in "$OUT"/bin/*; do
            ldd "$b" | awk '/=>/{print $3}' | grep -E '^/' | sort -u | while read -r so; do cp -n "$so" "$OUT/lib/" || true; done
            patchelf --set-rpath '$ORIGIN/../lib' "$b" || true
          done
          tar -czf "qemu-${{ matrix.plat }}-${{ matrix.arch }}.tar.gz" -C "$OUT" .

      - name: Attach to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create vm-assets-v1 --title "VM assets" \
            --notes "Portable QEMU + base image for Aria's built-in run environment." 2>/dev/null || true
          gh release upload vm-assets-v1 "qemu-${{ matrix.plat }}-${{ matrix.arch }}.tar.gz" --clobber

  # macOS-only fast path: Apple Virtualization.framework (VZ) via vfkit. QEMU's
  # HVF accelerator is broken on Apple Silicon M4 (SME sysreg assertion), so on
  # Mac the built-in VM boots under vfkit instead - same per-user local VM, no
  # HVF. Networking is user-mode via gvproxy (no vmnet entitlement required).
  vfkit:
    runs-on: macos-14
    steps:
      - name: Download, sign, and package vfkit + gvproxy
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euxo pipefail
          mkdir -p out/bin
          # vfkit: Apple Virtualization.framework CLI (Go static binary - no dylibs).
          curl -fL -o out/bin/vfkit \
            "https://github.com/crc-org/vfkit/releases/latest/download/vfkit"
          # gvproxy: user-mode networking, no privileged vmnet entitlement needed.
          curl -fL -o out/bin/gvproxy \
            "https://github.com/containers/gvisor-tap-vsock/releases/latest/download/gvproxy-darwin"
          chmod +x out/bin/vfkit out/bin/gvproxy
          # Do NOT re-sign: the official vfkit is already Developer-ID signed and
          # notarized with BOTH the com.apple.security.virtualization AND
          # com.apple.vm.networking entitlements. An ad-hoc re-sign would strip
          # the networking entitlement and break vmnet/gvproxy. vfkit's own
          # entitlements govern vfkit regardless of Aria being unsigned. tar drops
          # the quarantine xattr, so the extracted binary runs without Gatekeeper.
          codesign -dv --entitlements - out/bin/vfkit || true
          tar -czf vfkit-darwin.tar.gz -C out .
          gh release create vm-assets-v1 --title "VM assets" \
            --notes "Portable QEMU + base image for Aria's built-in run environment." 2>/dev/null || true
          gh release upload vm-assets-v1 vfkit-darwin.tar.gz --clobber
