# One-off release for Windows on ARM (win32 arm64). The Intel macOS (.dmg) leg
# already shipped in the `qoka-0.3.9-intel` release, so this now builds ONLY the
# Windows ARM64 installer and adds it to that same release.
#
# Why a NATIVE ARM runner (not a cross-build on x64):
#   build/.npmrc pins `build_from_source=true`, so build-time native modules
#   (tree-sitter) are COMPILED, not downloaded. Cross-compiling them to arm64 on
#   an x64 runner fails - the arm64 `node.lib` import library isn't in node-gyp's
#   cache (LNK1181), and an arm64 build tool can't run on an x64 host anyway.
#   Building on `windows-11-arm` makes host==target==arm64, so the exact path the
#   working x64 build uses just works, natively. GitHub's windows-11-arm hosted
#   runner is free for public repos.
#
# Design notes:
#   * Manual only (workflow_dispatch) - never fires on a tag push.
#   * The app SOURCE is always cloned from a FIXED tag (default qoka-v0.3.9), so
#     the build reflects exactly that tree - never this branch, never a local
#     uncommitted change.
#   * The release tag (default `qoka-0.3.9-intel`) deliberately does NOT match
#     release-app.yml's `qoka-v*` trigger glob, so it can never kick off the
#     normal arm64-.dmg / x64-.exe build. Those releases stay untouched, and the
#     Intel .dmg already on this release is left in place (we only add the .exe).
#
# UNSIGNED build: SmartScreen warns (More info -> Run anyway). Cross-arch app
# behaviour is not validated on real ARM-Windows hardware - smoke-test first.
name: Release (Windows ARM64)

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Existing app tag to build from (the source tree).'
        default: 'qoka-v0.3.9'
        required: true
      release_tag:
        description: 'Tag for THIS release. Must NOT match qoka-v* or it would trigger the normal build.'
        default: 'qoka-0.3.9-intel'
        required: true
      release_title:
        description: 'Release name shown on GitHub.'
        default: 'intel winarm'
        required: true

permissions:
  contents: write

jobs:
  # Ensure the release exists (it already does from the Intel run; this is a
  # no-op re-run guard so the workflow also works if the release was deleted).
  init:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Resolve source tag -> commit SHA
        id: resolve
        shell: bash
        run: |
          SHA="$(git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" \
                 "refs/tags/${{ inputs.source_tag }}" | cut -f1)"
          if [ -z "$SHA" ]; then
            echo "::error::Source tag ${{ inputs.source_tag }} not found on origin."
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
      - name: Create the release if missing
        shell: bash
        run: |
          gh release create "${{ inputs.release_tag }}" \
            --target "${{ steps.resolve.outputs.sha }}" \
            --title "${{ inputs.release_title }}" \
            --notes "Cross-arch installers for ${{ inputs.source_tag }}. Unsigned; not validated on native hardware." \
            2>/dev/null || echo "Release ${{ inputs.release_tag }} already exists - reusing it."

  build:
    needs: [init]
    # Native ARM64 Windows runner - host==target==arm64, so no cross-compile.
    runs-on: windows-11-arm
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      # @vscode/ripgrep (and other prebuilt downloaders) query the GitHub API;
      # unauthenticated CI hits the 60/hr limit and 403s. Authenticate it.
      GITHUB_TOKEN: ${{ github.token }}
      # Host arch == arm64, so this is NOT a cross-build; node-gyp downloads the
      # arm64 node.lib for the target the same way the x64 build does for x64.
      npm_config_arch: arm64
      npm_config_target_arch: arm64
    steps:
      - name: Clone the source tag
        shell: bash
        run: git clone --depth 1 --branch "${{ inputs.source_tag }}" "https://x-access-token:${GH_TOKEN}@github.com/${GH_REPO}.git" .

      # Node comes straight from nodejs.org - the arm64 Windows build to match
      # the native runner. PowerShell + Expand-Archive (Git Bash tar can't read .zip).
      - name: Install Node from .nvmrc (Windows ARM64)
        shell: pwsh
        run: |
          $V = (Get-Content .nvmrc -Raw).Trim()
          $F = "node-v$V-win-arm64"
          curl.exe -fsSL "https://nodejs.org/dist/v$V/$F.zip" -o node.zip
          Expand-Archive -Path node.zip -DestinationPath . -Force
          "$PWD\$F" | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # preinstall.ts checks default VS install paths and can miss the runner's
      # edition; point it straight at the real install via vswhere.
      - name: Locate Visual Studio
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vs = & $vswhere -latest -products * -property installationPath
          if (-not $vs) { throw "Visual Studio not found via vswhere" }
          "vs2022_install=$vs" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Found Visual Studio at: $vs"

      # patchWin32DependenciesTask strips/verifies Authenticode signatures with
      # signtool.exe (from the Windows SDK), which isn't on PATH by default. Pick
      # whichever arch's signtool the SDK ships (arm64 or x64 both work).
      - name: Add Windows SDK (signtool) to PATH
        shell: pwsh
        run: |
          $sdk = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\*\signtool.exe" -ErrorAction SilentlyContinue |
                 Where-Object { $_.FullName -match '\\(arm64|x64)\\signtool.exe$' } |
                 Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $sdk) { throw "signtool.exe not found in Windows Kits" }
          Write-Host "Found signtool at: $($sdk.FullName)"
          Split-Path $sdk.FullName | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8

      # node-gyp can pick a too-new Python (3.14) that crashes native builds.
      # Prefer a stable 3.12/3.11 from the toolcache (either arch folder) if present.
      - name: Pin a node-gyp-friendly Python
        shell: pwsh
        run: |
          $py = Get-ChildItem "C:\hostedtoolcache\windows\Python\3.12.*\*\python.exe","C:\hostedtoolcache\windows\Python\3.11.*\*\python.exe" -ErrorAction SilentlyContinue |
                Sort-Object FullName -Descending | Select-Object -First 1
          if ($py) {
            Write-Host "Using Python: $($py.FullName)"
            "npm_config_python=$($py.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          } else {
            Write-Host "No 3.11/3.12 Python in toolcache; keeping default."
          }
          # Run the postinstall's per-directory npm installs one at a time: parallel
          # child processes can crash the Windows build with 0xC0000409.
          "VSCODE_POSTINSTALL_CONCURRENCY=1" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      # Use `npm install`, not `npm ci`: some Qoka extensions ship without a
      # committed package-lock.json, and the root postinstall runs the same
      # command in every workspace dir - `npm ci` aborts there.
      - name: Install dependencies
        shell: bash
        run: npm install

      # Build every bundled Qoka extension so its compiled output ships in the
      # app (gulp packaging only COPIES existing output, it never compiles).
      - name: Build Qoka extensions
        shell: bash
        run: |
          set -e
          transpile_tasks=""
          for d in extensions/aria-*/; do
            name="$(basename "$d")"
            if [ -f "$d/build.mjs" ]; then
              echo "== $name (esbuild) =="
              (cd "$d" && npm install && node build.mjs)
            elif [ -f "$d/tsconfig.json" ]; then
              transpile_tasks="$transpile_tasks transpile-extension:$name"
            fi
          done
          if [ -n "$transpile_tasks" ]; then
            echo "== gulp$transpile_tasks =="
            npm run gulp -- $transpile_tasks
          fi

      - name: Build app tree
        run: npm run gulp vscode-win32-arm64-min

      - name: Package Windows (.exe)
        shell: bash
        run: |
          npm run gulp vscode-win32-arm64-inno-updater
          npm run gulp vscode-win32-arm64-user-setup
          mkdir -p artifacts
          # Rename so the arch is unmistakable (the raw Inno output is QokaSetup.exe
          # with no arch suffix, indistinguishable from the x64 installer).
          src="$(ls .build/win32-arm64/user-setup/*.exe | head -n1)"
          cp "$src" "artifacts/QokaSetup-arm64.exe"

      - name: Upload installer to the release
        shell: bash
        run: gh release upload "${{ inputs.release_tag }}" artifacts/QokaSetup-arm64.exe --clobber
